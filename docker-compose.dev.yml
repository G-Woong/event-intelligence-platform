# docker-compose.dev.yml — 로컬 개발 스택 정의 (build/up 금지: 다음 단계에서 검증)
# 구성:
#   - milvus-etcd      : Milvus 메타 저장
#   - milvus-minio     : Milvus 오브젝트 저장
#   - milvus-standalone: Milvus 본체
#   - redis            : Celery broker / 캐시
# app / worker 서비스는 다음 단계 scaffold 확정 후 추가한다.

name: event-intelligence-dev

services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ei-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command:
      - etcd
      - -advertise-client-urls=http://127.0.0.1:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ei-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.4.10
    container_name: ei-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # Web UI / metrics
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: ei-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    container_name: ei-postgres
    environment:
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_pass
      POSTGRES_DB: event_intel
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_user -d event_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ei-backend
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: 19530
      DATABASE_URL: postgresql+asyncpg://event_user:event_pass@postgres:5432/event_intel
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    container_name: ei-worker
    environment:
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: on-failure

  agent-worker:
    build:
      context: .
      dockerfile: agents/Dockerfile
    container_name: ei-agent-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_URL: http://backend:8000
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: on-failure

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  pg_data:
