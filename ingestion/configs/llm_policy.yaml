# provider는 LLM_PROVIDER 환경변수로 override 가능 (mock | openai)
provider: mock
model: gpt-4o-mini
temperature: 0.1
max_tokens: 512
timeout_sec: 30

max_html_chars_to_llm: 4000

prompts:
  extraction_judge: |
    You are an extraction quality judge.
    Given the title, snippet, and metadata of a web page extraction,
    assess whether the content is a real news/event article with sufficient quality.
    Return JSON: {"is_valid": bool, "confidence": float, "reason": str}

  event_extraction: |
    Extract structured event information from the given article snippet.
    Return JSON matching the EventCandidate schema.
    Do NOT include investment advice or buy/sell recommendations.
